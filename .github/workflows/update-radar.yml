name: Update Topic Radar

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # 升级到 v5 适配 Node24 运行时，消除告警
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run refresh
      - name: Commit updated radar data
        run: |
          if git diff --quiet -- public/data/latest.json; then
            echo "No radar changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          git commit -m "chore: update topic radar data"
          git push

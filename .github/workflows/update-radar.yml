name: Update Topic Radar & Deploy Pages

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run refresh

      # 提交数据变更（原有逻辑保留）
      - name: Commit updated radar data
        run: |
          if git diff --quiet -- public/data/latest.json; then
            echo "No radar changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/latest.json
            git commit -m "chore: update topic radar data"
            git push
          fi

      # 部署 public 文件夹到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
